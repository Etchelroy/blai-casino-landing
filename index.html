    .btn-nav-gold:focus-visible { outline:2px solid var(--cyan); outline-offset:3px; }
    .hamburger {
      display:none; flex-direction:column; gap:5px;
      cursor:pointer; background:none; border:none; padding:4px;
    }
    .hamburger span {
      display:block; width:24px; height:2px;
      background:var(--text-primary); border-radius:2px; transition:all 0.3s;
    }
    .mobile-menu {
      display:none; position:fixed; top:72px; left:0; right:0;
      background:rgba(15,20,25,0.97); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border); z-index:899;

    .mobile-menu.open { display:flex; }
    .mobile-menu a {
      color:var(--text-secondary); text-decoration:none; font-size:16px;

    }
    .mobile-menu a:hover { color:var(--gold); }
    .mobile-menu .btn-gold { margin-top:8px; }
